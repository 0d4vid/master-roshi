name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run repository tests
        run: python -m unittest discover -s tests -v

      # The official quick_validate.py is not vendored and has no stable,
      # portable download URL. Repository tests remain the deterministic gate.
